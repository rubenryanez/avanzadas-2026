<style>
* { box-sizing: border-box; }
:root {
  --bg: #F7F7F4;
  --paper: #FFFFFF;
  --ink-1: #0F172A;
  --ink-2: #1F2937;
  --ink-3: #4B5563;
  --ink-4: #6B7280;
  --ink-5: #9CA3AF;
  --line: #E5E7EB;
  --line-soft: #F1F2EE;
  --accent: #1D9E75;
  --warn: #BA7517;
  --warn-bg: #FAEEDA;
  --warn-bd: #EF9F27;
  --warn-text: #412402;
  --warn-text-2: #854F0B;
  --crit: #993C1D;
  --gold: #D4B57E;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', Menlo, Monaco, Consolas, 'Liberation Mono', monospace;
}
html, body { margin: 0; padding: 0; font-family: var(--font-sans); background: var(--bg); color: var(--ink-1); -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; }
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 32px; }
.header { background: #0F172A; color: white; padding: 16px 18px 18px; display: flex; align-items: center; gap: 10px; }
.header-logo { width: 26px; height: 26px; background: #1F2937; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-logo::after { content: ''; width: 7px; height: 7px; background: var(--gold); border-radius: 50%; }
.header-text { line-height: 1.2; }
.header-title { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; color: rgba(255,255,255,0.7); font-family: var(--font-mono); }
.header-sub { font-size: 15px; font-weight: 500; margin-top: 2px; }
.search-wrap { padding: 20px 18px 0; }
.search-title { font-size: 19px; font-weight: 500; margin: 0 0 4px 0; letter-spacing: -0.01em; }
.search-subtitle { font-size: 13px; color: var(--ink-4); margin: 0 0 16px 0; line-height: 1.4; }
.search-input-wrap { position: relative; margin-bottom: 14px; }
.search-input { width: 100%; padding: 13px 14px 13px 42px; border: 1px solid var(--line); border-radius: 10px; background: white; font-size: 15px; font-family: inherit; color: var(--ink-1); outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
.search-input:focus { border-color: var(--ink-1); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--ink-4); }
.search-results { margin-top: 6px; }
.search-empty { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); text-align: center; padding: 18px; background: white; border-radius: 10px; border: 1px dashed var(--line); }
.search-result { background: white; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s, transform 0.05s; -webkit-tap-highlight-color: transparent; }
.search-result:active { transform: scale(0.99); border-color: var(--ink-3); }
.search-result-name { font-size: 14px; font-weight: 500; color: var(--ink-1); }
.search-result-meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); margin-top: 3px; letter-spacing: 0.02em; }
.search-result-canal { display: inline-block; padding: 1px 6px; background: var(--line-soft); border-radius: 3px; margin-right: 4px; color: var(--ink-3); }
.search-footer { margin-top: 16px; padding: 14px 16px; background: white; border: 1px solid var(--line); border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-family: var(--font-mono); font-size: 11px; }
.search-footer-days { display: flex; align-items: center; gap: 6px; color: var(--ink-2); }
.search-footer-days strong { color: var(--ink-1); font-weight: 500; }
.search-footer-date { color: var(--ink-5); }
.card-wrap { padding: 16px 18px 0; }
.back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; padding: 8px 0; font-size: 13px; color: var(--ink-3); font-family: inherit; cursor: pointer; margin-bottom: 6px; -webkit-tap-highlight-color: transparent; }
.back-btn:active { color: var(--ink-1); }
.card-head { margin-bottom: 16px; }
.card-name { font-size: 16px; font-weight: 500; margin: 0; line-height: 1.3; }
.card-role { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); margin-top: 4px; letter-spacing: 0.02em; }
.banner { background: var(--warn-bg); border: 1px solid var(--warn-bd); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; display: flex; gap: 10px; align-items: flex-start; }
.banner-icon { width: 22px; height: 22px; color: var(--warn-text-2); flex-shrink: 0; }
.banner-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.07em; font-weight: 500; color: var(--warn-text-2); }
.banner-text { font-size: 13px; color: var(--warn-text); margin-top: 3px; line-height: 1.4; }
.banner-text strong { font-weight: 500; }
.block { background: white; border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.block-label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-5); letter-spacing: 0.07em; margin-bottom: 6px; }
.block-value { font-family: var(--font-mono); font-size: 26px; font-weight: 500; color: var(--ink-1); letter-spacing: -0.015em; line-height: 1.1; }
.block-value-sm { font-family: var(--font-mono); font-size: 22px; font-weight: 500; color: var(--ink-1); line-height: 1.1; }
.block-sub { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); margin-top: 6px; }
.progress { height: 6px; background: var(--line-soft); border-radius: 3px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; transition: width 0.3s; }
.progress-fill.ok { background: var(--accent); }
.progress-fill.warn { background: var(--warn); }
.progress-fill.crit { background: var(--crit); }
.rank-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
.rank-pos { font-family: var(--font-mono); font-size: 22px; font-weight: 500; color: var(--ink-1); }
.rank-total { font-family: var(--font-mono); font-size: 12px; color: var(--ink-4); margin-left: 4px; }
.rank-diff { text-align: right; }
.rank-diff-label { font-family: var(--font-mono); font-size: 10px; color: var(--ink-5); letter-spacing: 0.05em; }
.rank-diff-value { font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--crit); margin-top: 2px; }
.rank-diff-value.ok { color: var(--accent); }
.lines-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.line-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-1); }
.line-icon { width: 18px; height: 18px; flex-shrink: 0; }
.line-icon.ok { color: var(--accent); }
.line-icon.no { color: var(--crit); }
.line-item.no { color: var(--crit); font-weight: 500; }
.cupones-row { display: flex; align-items: center; gap: 12px; }
.cupones-icon { width: 22px; height: 22px; color: var(--warn); flex-shrink: 0; }
.cupones-icon.muted { color: var(--ink-5); }
.cupones-info { line-height: 1.3; }
.cupones-num { font-family: var(--font-mono); font-size: 16px; font-weight: 500; color: var(--ink-1); }
.cupones-num.muted { color: var(--ink-4); font-weight: 400; font-size: 14px; }
.card-footer { background: white; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
.card-footer-days { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-2); font-weight: 500; }
.card-footer-date { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-5); }
[hidden] { display: none !important; }
@media (max-width: 360px) { .block-value { font-size: 24px; } .search-title { font-size: 17px; } }
</style>

const CANAL_LABEL = { ffvv:'FFVV', relacion:'RELACIÓN', jjvv:'JEFES VENTA', jjoo:'JEFES OFICINA', asesores:'ASESORES' };
const CANAL_LABEL_LONG = { ffvv:'Fuerza de Venta', relacion:'Canal Relación', jjvv:'Jefes de Venta', jjoo:'Jefes de Oficina', asesores:'Asesores de Inversión' };

function normalize(s) {
  return (s || '').toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase().trim();
}
function fmtMM(pesos) {
  const mm = (pesos || 0) / 1e6;
  if (Math.abs(mm) >= 1000) return (mm / 1000).toFixed(1).replace('.', ',') + ' MMM';
  if (Math.abs(mm) >= 100) return Math.round(mm) + ' MM';
  return mm.toFixed(1).replace('.', ',') + ' MM';
}
function fmtClp(pesos) { return '$' + (pesos || 0).toLocaleString('es-CL'); }
function escapeHtml(s) {
  return (s || '').toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function setupSearch() {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  document.getElementById('diasRest').textContent = DATA.meta.dias_habiles_restantes;

  input.addEventListener('input', () => {
    const q = normalize(input.value);
    if (q.length < 2) { results.innerHTML = ''; return; }
    const words = q.split(/\s+/).filter(w => w.length >= 2);
    if (words.length === 0) { results.innerHTML = ''; return; }
    const matches = DATA.personas.filter(p => {
      const n = normalize(p.nombre);
      return words.every(w => n.includes(w));
    });
    if (matches.length === 0) {
      results.innerHTML = '<div class="search-empty">SIN COINCIDENCIAS</div>';
      return;
    }
    const top = matches.slice(0, 8);
    results.innerHTML = top.map(p => {
      const canal = CANAL_LABEL[p.canal] || p.canal.toUpperCase();
      const suc = p.sucursal || '—';
      return '<div class="search-result" data-id="' + DATA.personas.indexOf(p) + '">'
        + '<div class="search-result-name">' + escapeHtml(p.nombre) + '</div>'
        + '<div class="search-result-meta"><span class="search-result-canal">' + canal + '</span>' + escapeHtml(suc) + '</div>'
        + '</div>';
    }).join('');
    results.querySelectorAll('.search-result').forEach(el => {
      el.addEventListener('click', () => {
        const idx = parseInt(el.dataset.id);
        const p = DATA.personas[idx];
        showCard(p);
      });
    });
  });
}

function showCard(p) {
  document.getElementById('viewSearch').hidden = true;
  document.getElementById('viewCard').hidden = false;
  document.getElementById('cardContent').innerHTML = renderCard(p);
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function renderCard(p) {
  if (p.canal === 'jjvv' || p.canal === 'jjoo') return renderJefe(p);
  if (p.canal === 'asesores') return renderAsesor(p);
  return renderEjecutivo(p);
}

function renderBannerEjec(p) {
  if (p.elegible && p.ranking && p.ranking <= 3) {
    const premios = DATA.premios[p.canal] || [];
    const prem = premios.find(x => x.rank === p.ranking);
    const monto = prem ? prem.monto : null;
    return '<div class="banner">'
      + '<svg class="banner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>'
      + '<div>'
      + '<div class="banner-label">POSICIÓN ' + p.ranking + '° NACIONAL</div>'
      + (monto ? '<div class="banner-text">Premio si mantienes posición · <strong>' + fmtClp(monto) + '</strong></div>' : '')
      + '</div></div>';
  }
  if (!p.elegible && p.fallos_total === 1) {
    let mensaje = '';
    if (!p.cumple_capt && p.falta_capt > 0) {
      mensaje = 'Te faltan <strong>$' + fmtMM(p.falta_capt) + '</strong> en captación para clasificar.';
    } else if (!p.cumple_lineas && p.lineas_no_vendidas.length > 0) {
      const lineas = p.lineas_no_vendidas.join(' y ');
      mensaje = 'Te falta vender <strong>' + lineas + '</strong> para clasificar.';
    } else {
      mensaje = 'Te falta cumplir 1 requisito para clasificar.';
    }
    return '<div class="banner">'
      + '<svg class="banner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>'
      + '<div>'
      + '<div class="banner-label">A 1 REQUISITO DE CLASIFICAR</div>'
      + '<div class="banner-text">' + mensaje + '</div>'
      + '</div></div>';
  }
  return '';
}

function rankDiffEjec(p) {
  if (!p.elegible || p.ranking == null) return '';
  if (p.ranking <= 10) {
    const top1Monto = DATA.top_montos[p.canal] || 0;
    const dif = p.total - top1Monto;
    return '<div class="rank-diff">'
      + '<div class="rank-diff-label">DIF. CON 1°</div>'
      + '<div class="rank-diff-value">' + (dif >= 0 ? '+' : '−') + '$' + fmtMM(Math.abs(dif)) + '</div>'
      + '</div>';
  } else {
    const top3Monto = DATA.top3_montos[p.canal] || 0;
    const dif = p.total - top3Monto;
    return '<div class="rank-diff">'
      + '<div class="rank-diff-label">DIF. CON TOP 3</div>'
      + '<div class="rank-diff-value">' + (dif >= 0 ? '+' : '−') + '$' + fmtMM(Math.abs(dif)) + '</div>'
      + '</div>';
  }
}

function renderEjecutivo(p) {
  const banner = renderBannerEjec(p);
  const pct = p.umbral ? p.total / p.umbral : 0;
  const pctClamped = Math.min(1, Math.max(0, pct));
  let progCls = 'crit'; let progSub = '';
  if (pct >= 1) { progCls = 'ok'; progSub = Math.round(pct * 100) + '% del umbral · Cumplido'; }
  else if (pct >= 0.7) { progCls = 'warn'; progSub = Math.round(pct * 100) + '% del umbral · Faltan $' + fmtMM(p.umbral - p.total); }
  else { progCls = 'crit'; progSub = Math.round(pct * 100) + '% del umbral · Faltan $' + fmtMM(p.umbral - p.total); }

  const lineas = [
    { label: 'FFMM', val: p.ffmm, missing: p.lineas_no_vendidas.includes('FFMM') },
    { label: 'Gold', val: p.igold, missing: p.lineas_no_vendidas.includes('Gold') },
    { label: 'APV-T', val: p.traspasos, missing: p.lineas_no_vendidas.includes('APV-T') },
    { label: 'CUI', val: p.cui, missing: p.lineas_no_vendidas.includes('CUI') }
  ];
  const lineasHtml = lineas.map(l => {
    const hasVenta = (l.val || 0) > 0;
    const itemCls = hasVenta ? '' : ' no';
    const icon = hasVenta
      ? '<svg class="line-icon ok" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>'
      : '<svg class="line-icon no" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
    const label = hasVenta ? l.label : l.label + ' · Pendiente';
    return '<div class="line-item' + itemCls + '">' + icon + '<span>' + label + '</span></div>';
  }).join('');

  const totalCanal = DATA.totales_canal[p.canal] || 0;
  const rankText = p.elegible && p.ranking != null
    ? '<span class="rank-pos">' + p.ranking + '°</span><span class="rank-total">de ' + totalCanal + ' ' + CANAL_LABEL[p.canal] + '</span>'
    : '<span class="rank-pos" style="color:var(--ink-4);">Sin clasificar</span>';
  const rankDiff = p.elegible ? rankDiffEjec(p) : '';

  const tieneCupones = p.cupones > 0;
  const cuponesHtml = '<div class="cupones-row">'
    + '<svg class="cupones-icon' + (tieneCupones ? '' : ' muted') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v4a2 2 0 0 1 0 4v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4a2 2 0 0 1 0-4Z"/><line x1="13" y1="5" x2="13" y2="7"/><line x1="13" y1="11" x2="13" y2="13"/><line x1="13" y1="17" x2="13" y2="19"/></svg>'
    + '<div class="cupones-info">'
    + '<div class="block-label" style="margin-bottom:2px;">CUPONES DE SORTEO</div>'
    + (tieneCupones
      ? '<div class="cupones-num">' + (p.cupones === 1 ? p.cupones + ' cupón' : p.cupones + ' cupones') + ' acumulado' + (p.cupones === 1 ? '' : 's') + '</div>'
      : '<div class="cupones-num muted">0 cupones · clasifica para acumular</div>')
    + '</div></div>';

  return '<div class="card-head">'
    + '<h2 class="card-name">' + escapeHtml(p.nombre) + '</h2>'
    + '<div class="card-role">' + CANAL_LABEL_LONG[p.canal] + ' · ' + escapeHtml(p.sucursal || '—') + (p.clasificacion ? ' · ' + escapeHtml(p.clasificacion) : '') + '</div>'
    + '</div>'
    + banner
    + '<div class="block">'
    + '<div class="block-label">CAPTACIÓN NETA</div>'
    + '<div class="block-value">$' + fmtMM(p.total) + '</div>'
    + (p.umbral > 0 ? '<div class="progress"><div class="progress-fill ' + progCls + '" style="width:' + (pctClamped * 100).toFixed(0) + '%;"></div></div>' : '')
    + (p.umbral > 0 ? '<div class="block-sub">' + progSub + '</div>' : '')
    + '</div>'
    + '<div class="block">'
    + '<div class="block-label">RANKING NACIONAL</div>'
    + '<div class="rank-row"><div>' + rankText + '</div>' + rankDiff + '</div>'
    + '</div>'
    + '<div class="block">'
    + '<div class="block-label" style="margin-bottom:10px;">LÍNEAS DE PRODUCTO</div>'
    + '<div class="lines-grid">' + lineasHtml + '</div>'
    + '</div>'
    + '<div class="block">' + cuponesHtml + '</div>'
    + renderCardFooter();
}

function renderJefe(p) {
  const totalCanal = DATA.totales_canal[p.canal] || 0;
  let banner = '';
  if (p.elegible && p.ranking && p.ranking <= 3) {
    const premios = DATA.premios[p.canal] || [];
    const prem = premios.find(x => x.rank === p.ranking);
    const monto = prem ? prem.monto : null;
    banner = '<div class="banner">'
      + '<svg class="banner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>'
      + '<div>'
      + '<div class="banner-label">POSICIÓN ' + p.ranking + '° NACIONAL</div>'
      + (monto ? '<div class="banner-text">Premio si mantienes posición · <strong>' + fmtClp(monto) + '</strong></div>' : '')
      + '</div></div>';
  }
  const pctEjec = p.pct_ejec_con_venta || 0;
  const pctEjecPct = Math.round(pctEjec * 100);
  // Meta correcta según bases (viene embebida en el payload)
  const umbralMeta = p.umbral_equipo_meta || 0.30;
  const umbralMetaPct = Math.round(umbralMeta * 100);
  const cumpleEquipo = pctEjec >= umbralMeta;
  // Color del progress: verde si cumple, ámbar si entre 50%-100% del umbral, rojo si <50%
  const ratio = umbralMeta > 0 ? pctEjec / umbralMeta : 0;
  const pctCls = cumpleEquipo ? 'ok' : (ratio >= 0.5 ? 'warn' : 'crit');
  // Mensaje contextual según meta correcta
  const subMensaje = cumpleEquipo
    ? 'Equipo activo · sobre meta ' + umbralMetaPct + '%'
    : 'Activar más ejecutivos · meta ' + umbralMetaPct + '%';

  const rankText = p.elegible && p.ranking != null
    ? '<span class="rank-pos">' + p.ranking + '°</span><span class="rank-total">de ' + totalCanal + ' ' + CANAL_LABEL[p.canal] + '</span>'
    : '<span class="rank-pos" style="color:var(--ink-4);">Sin clasificar</span>';
  const rankDiff = p.elegible ? rankDiffEjec(p) : '';

  const tieneCupones = p.cupones > 0;
  const cuponesHtml = '<div class="cupones-row">'
    + '<svg class="cupones-icon' + (tieneCupones ? '' : ' muted') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v4a2 2 0 0 1 0 4v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4a2 2 0 0 1 0-4Z"/><line x1="13" y1="5" x2="13" y2="7"/><line x1="13" y1="11" x2="13" y2="13"/><line x1="13" y1="17" x2="13" y2="19"/></svg>'
    + '<div class="cupones-info">'
    + '<div class="block-label" style="margin-bottom:2px;">CUPONES DE SORTEO</div>'
    + (tieneCupones
      ? '<div class="cupones-num">' + (p.cupones === 1 ? p.cupones + ' cupón' : p.cupones + ' cupones') + ' acumulado' + (p.cupones === 1 ? '' : 's') + '</div>'
      : '<div class="cupones-num muted">0 cupones</div>')
    + '</div></div>';

  return '<div class="card-head">'
    + '<h2 class="card-name">' + escapeHtml(p.nombre) + '</h2>'
    + '<div class="card-role">' + CANAL_LABEL_LONG[p.canal] + ' · ' + escapeHtml(p.sucursal || '—') + (p.clasificacion ? ' · ' + escapeHtml(p.clasificacion) : '') + '</div>'
    + '</div>'
    + banner
    + '<div class="block">'
    + '<div class="block-label">CAPTACIÓN CONSOLIDADA EQUIPO</div>'
    + '<div class="block-value">$' + fmtMM(p.total) + '</div>'
    + '</div>'
    + (p.n_ejec > 0
      ? '<div class="block">'
        + '<div class="block-label">EJECUTIVOS CON VENTA</div>'
        + '<div class="block-value-sm">' + p.n_ejec_con_venta + ' de ' + p.n_ejec + ' <span style="font-size:14px;color:' + (cumpleEquipo ? 'var(--accent)' : 'var(--warn)') + ';">(' + pctEjecPct + '%)</span></div>'
        + '<div class="progress"><div class="progress-fill ' + pctCls + '" style="width:' + Math.min(100, pctEjecPct) + '%;"></div></div>'
        + '<div class="block-sub">' + subMensaje + '</div>'
        + '</div>'
      : '')
    + '<div class="block">'
    + '<div class="block-label">RANKING NACIONAL</div>'
    + '<div class="rank-row"><div>' + rankText + '</div>' + rankDiff + '</div>'
    + '</div>'
    + '<div class="block">' + cuponesHtml + '</div>'
    + renderCardFooter();
}

function renderAsesor(p) {
  const cat = p.grupo_ranking || p.clasificacion;
  let banner = '';
  if (p.ranking === 1) {
    const premios = DATA.premios.asesores || [];
    const prem = premios.find(x => x.categoria === cat);
    const monto = prem ? prem.monto : null;
    banner = '<div class="banner">'
      + '<svg class="banner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>'
      + '<div>'
      + '<div class="banner-label">1° EN ' + (cat || '').toUpperCase() + '</div>'
      + (monto ? '<div class="banner-text">Premio si mantienes posición · <strong>' + fmtClp(monto) + '</strong></div>' : '')
      + '</div></div>';
  }
  const topCatMonto = DATA.top_asesor_cat[cat] || 0;
  const dif = p.total - topCatMonto;
  const showDif = p.ranking != null && p.ranking > 1;
  const rankDiffHtml = showDif
    ? '<div class="rank-diff">'
      + '<div class="rank-diff-label">DIF. CON 1°</div>'
      + '<div class="rank-diff-value">' + (dif >= 0 ? '+' : '−') + '$' + fmtMM(Math.abs(dif)) + '</div>'
      + '</div>'
    : '';

  const totalCat = (DATA.personas || []).filter(x => x.canal === 'asesores' && (x.grupo_ranking || x.clasificacion) === cat).length;
  const pctEquipo = p.pct_ejec_clasificados || 0;
  const pctEquipoPct = Math.round(pctEquipo * 100);

  const tieneCupones = p.cupones > 0;
  const cuponesHtml = '<div class="cupones-row">'
    + '<svg class="cupones-icon' + (tieneCupones ? '' : ' muted') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v4a2 2 0 0 1 0 4v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4a2 2 0 0 1 0-4Z"/><line x1="13" y1="5" x2="13" y2="7"/><line x1="13" y1="11" x2="13" y2="13"/><line x1="13" y1="17" x2="13" y2="19"/></svg>'
    + '<div class="cupones-info">'
    + '<div class="block-label" style="margin-bottom:2px;">CUPONES DE SORTEO</div>'
    + (tieneCupones
      ? '<div class="cupones-num">' + (p.cupones === 1 ? p.cupones + ' cupón' : p.cupones + ' cupones') + '</div>'
      : '<div class="cupones-num muted">0 cupones</div>')
    + '</div></div>';

  return '<div class="card-head">'
    + '<h2 class="card-name">' + escapeHtml(p.nombre) + '</h2>'
    + '<div class="card-role">Asesor · ' + escapeHtml(p.sucursal || '—') + ' · ' + escapeHtml(cat) + '</div>'
    + '</div>'
    + banner
    + '<div class="block">'
    + '<div class="block-label">CAPTACIÓN NETA</div>'
    + '<div class="block-value">$' + fmtMM(p.total) + '</div>'
    + '</div>'
    + (p.n_ejec > 0
      ? '<div class="block">'
        + '<div class="block-label">% EQUIPO CLASIFICADO</div>'
        + '<div class="block-value-sm">' + p.n_ejec_clasificados + ' de ' + p.n_ejec + ' <span style="font-size:14px;color:var(--ink-4);">(' + pctEquipoPct + '%)</span></div>'
        + '<div class="progress"><div class="progress-fill ok" style="width:' + Math.min(100, pctEquipoPct) + '%;"></div></div>'
        + '</div>'
      : '')
    + '<div class="block">'
    + '<div class="block-label">RANKING EN ' + (cat || '').toUpperCase() + '</div>'
    + '<div class="rank-row"><div><span class="rank-pos">' + (p.ranking != null ? p.ranking + '°' : '—') + '</span><span class="rank-total">de ' + totalCat + ' asesores</span></div>' + rankDiffHtml + '</div>'
    + '</div>'
    + '<div class="block">' + cuponesHtml + '</div>'
    + renderCardFooter();
}

function renderCardFooter() {
  return '<div class="card-footer">'
    + '<div class="card-footer-days">'
    + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'
    + '<span>' + DATA.meta.dias_habiles_restantes + ' días hábiles</span>'
    + '</div>'
    + '<div class="card-footer-date">Hasta ' + DATA.meta.fecha_termino + '</div>'
    + '</div>';
}

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('viewCard').hidden = true;
  document.getElementById('viewSearch').hidden = false;
  document.getElementById('searchInput').focus();
});

setupSearch();
</script>
</body>
</html>
